name: Migrate

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - drizzle/**
      - src/drizzle/**

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: cadastre
          POSTGRES_USER: cadastre_user
          POSTGRES_PASSWORD: cadastre_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cadastre_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://cadastre_user:cadastre_pass@localhost:5432/cadastre

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate
