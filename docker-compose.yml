version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cadastre-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-cadastre}
      POSTGRES_USER: ${DB_USER:-cadastre_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cadastre_pass_local}
    ports:
      - "${DB_PORT:-5432}:5432"
    # Bind the DB data directory to a host path on the large disk to avoid running out of space.
    # Set POSTGRES_DATA_DIR env var before `docker compose up` to override the default host path.
    volumes:
      - "${POSTGRES_DATA_DIR:-/media/duko/New Volume/postgres_data}:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cadastre_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cadastre-network

volumes: {}

networks:
  cadastre-network:
    driver: bridge
